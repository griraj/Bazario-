# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1

# ─── DataSource (PostgreSQL) ──────────────────────────────────────────────────
spring.datasource.url=${BAZARIO_DB_URL:jdbc:postgresql://localhost:5432/bazario}
spring.datasource.username=${BAZARIO_DB_USER:bazario}
spring.datasource.password=${BAZARIO_DB_PASS:bazario}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Override via environment variable in production – never commit real secrets
bazario.jwt.secret=${BAZARIO_JWT_SECRET:BazarioSuperSecretKeyForJWTSigningThatIsAtLeast256BitsLong!}
bazario.jwt.expiration-ms=${BAZARIO_JWT_EXPIRY_MS:86400000}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.bazario=DEBUG
logging.level.org.springframework.security=INFO

# ─── OpenAPI ──────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
